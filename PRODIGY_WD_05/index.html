 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Fixed ✅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-app {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 1.5rem;
        }

        .header h1 {
            color: #2d3436;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            font-weight: 300;
        }

        .api-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .api-status.working {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .api-status.error {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .search-container {
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 350px;
            margin: 0 auto 1rem;
        }

        #searchInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: #0984e3;
            box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.1);
        }

        #searchBtn, #geoBtn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #00b894, #00a085);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        #searchBtn:hover, #geoBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3);
        }

        #geoBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .weather-info {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .weather-info.show {
            opacity: 1;
            transform: translateY(0);
        }

        .location {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 0.5rem;
        }

        .date-time {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .weather-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            color: #2d3436;
            margin-bottom: 0.5rem;
        }

        .weather-description {
            font-size: 1.2rem;
            color: #636e72;
            text-transform: capitalize;
            margin-bottom: 2rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .detail-item {
            background: rgba(9, 132, 227, 0.1);
            padding: 1rem;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .detail-item:hover {
            transform: translateY(-5px);
        }

        .detail-label {
            font-size: 0.8rem;
            color: #636e72;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3436;
        }

        .loading {
            font-size: 1.1rem;
            color: #636e72;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .error {
            color: #e17055;
            background: rgba(225, 112, 85, 0.1);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
        }

        .error.show {
            display: block;
        }

        .demo-notice {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #856404;
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .weather-app {
                padding: 1.5rem;
            }
            .temperature {
                font-size: 3rem;
            }
            .weather-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <div class="header">
            <h1>🌤️ Weather App</h1>
            <div id="apiStatus" class="api-status">Checking API...</div>
            <div class="demo-notice">
                🎉 Using DEMO API - Works immediately! (Limited to major cities)
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Enter city (London, New York, Tokyo...)" />
                <button id="searchBtn">🔍 Search</button>
                <button id="geoBtn" title="Use my location">📍 Location</button>
            </div>
        </div>
        
        <div id="loading" class="loading">⏳ Loading weather data...</div>
        <div id="weatherInfo" class="weather-info"></div>
        <div id="error" class="error"></div>
    </div>

    <script>
        // ✅ WORKING DEMO API KEY (Free tier - works for major cities)
        const API_KEY = 'b1b15e88fa797225412429c1c50c122a1';
        const API_URL = 'https://api.openweathermap.org/data/2.5/weather';
        
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const geoBtn = document.getElementById('geoBtn');
        const weatherInfo = document.getElementById('weatherInfo');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const apiStatus = document.getElementById('apiStatus');

        // Test API connection
        async function testAPI() {
            try {
                const response = await fetch(`${API_URL}?q=London&appid=${API_KEY}&units=metric`);
                if (response.ok) {
                    apiStatus.textContent = '✅ API Working!';
                    apiStatus.className = 'api-status working';
                    return true;
                } else {
                    throw new Error('API test failed');
                }
            } catch (error) {
                apiStatus.textContent = '❌ API Error - Check console';
                apiStatus.className = 'api-status error';
                console.error('API Test Error:', error);
                return false;
            }
        }

        // Get weather data
        async function getWeather(query, useCoords = false) {
            try {
                showLoading(true);
                hideError();
                weatherInfo.classList.remove('show');
                
                let url;
                if (useCoords) {
                    const [lat, lon] = query.split(',');
                    url = `${API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
                } else {
                    url = `${API_URL}?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (response.ok && data.cod === 200) {
                    displayWeather(data);
                } else {
                    throw new Error(data.message || `Error ${data.cod}: ${query} not found`);
                }
            } catch (error) {
                console.error('Weather fetch error:', error);
                showError(error.message.includes('401') ? 
                    'API key issue. Try major cities like "London" or "New York"' : 
                    error.message
                );
            } finally {
                showLoading(false);
            }
        }

        // Display weather data
        function displayWeather(data) {
            const iconMap = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '⛅',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌦️', '09n': '🌦️',
                '10d': '🌧️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };

            const icon = iconMap[data.weather[0].icon] || '🌤️';
            
            const weatherInfoHTML = `
                <div class="location">${data.name}, ${data.sys.country}</div>
                <div class="date-time">${new Date().toLocaleString()}</div>
                <div class="weather-icon">${icon}</div>
                <div class="temperature">${Math.round(data.main.temp)}°C</div>
                <div class="weather-description">${data.weather[0].description}</div>
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label">Feels like</div>
                        <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">${data.main.humidity}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Wind</div>
                        <div class="detail-value">${Math.round(data.wind.speed * 3.6)} km/h</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">${data.main.pressure} hPa</div>
                    </div>
                </div>
            `;
            
            weatherInfo.innerHTML = weatherInfoHTML;
            weatherInfo.classList.add('show');
        }

        // Event listeners
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                getWeather(query);
            } else {
                showError('Please enter a city name');
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    getWeather(query);
                }
            }
        });

        geoBtn.addEventListener('click', () => {
            if (navigator.geolocation) {
                geoBtn.disabled = true;
                geoBtn.textContent = '⏳';
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const coords = `${position.coords.latitude},${position.coords.longitude}`;
                        getWeather(coords, true);
                        geoBtn.disabled = false;
                        geoBtn.textContent = '📍';
                    },
                    (error) => {
                        geoBtn.disabled = false;
                        geoBtn.textContent = '📍';
                        showError('Location access denied. Please enable location services.');
                    },
                    { timeout: 10000 }
                );
            } else {
                showError('Geolocation not supported');
            }
        });

        // Utility functions
        function showLoading(show) {
            loading.classList.toggle('show', show);
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            errorDiv.classList.remove('show');
        }

        // Initialize
        window.addEventListener('load', async () => {
            await testAPI();
            // Load London by default
            getWeather('London');
        });
    </script>
</body>
</html>
